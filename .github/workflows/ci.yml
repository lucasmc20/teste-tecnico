name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  back-end:
    name: Back-end — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Testes unitários e HTTP
        run: npm test
        env:
          NODE_ENV: test
          PORT: 3333
          JWT_SECRET: ci-test-secret
          ADMIN_USER: admin
          ADMIN_PASS: secret

  front-end:
    name: Front-end — typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Testes unitários
        run: npm test

  e2e:
    name: Front-end — E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [back-end, front-end]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências do back-end
        working-directory: back-end
        run: npm ci

      - name: Instalar dependências do front-end
        working-directory: front-end
        run: npm ci

      - name: Instalar Playwright browsers
        working-directory: front-end
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        working-directory: front-end
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3333

      - name: Iniciar back-end
        working-directory: back-end
        run: npm start &
        env:
          PORT: 3333
          JWT_SECRET: ci-test-secret
          ADMIN_USER: admin
          ADMIN_PASS: secret

      - name: Iniciar front-end
        working-directory: front-end
        run: npm start &
        env:
          PORT: 3000

      - name: Aguardar serviços
        run: |
          npx wait-on http://localhost:3333/health http://localhost:3000 --timeout 30000

      - name: Rodar testes E2E
        working-directory: front-end
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000
          ADMIN_USER: admin
          ADMIN_PASS: secret

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: front-end/playwright-report/
          retention-days: 7
